<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BloomFlow – Корзина</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Bf+3JM6zmGdZoBxt7z6p1ycJjYEtbtDKEdrSTqH1Y8VC4+p4XDphvUlzX0C3AlIWlmVl8RkIw2DY8a+VuFaz2A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script defer src="../navigation.js"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="../index.html" class="logo">BloomFlow</a>
      <ul class="nav-links">
        <li><a href="../index.html">Домой</a></li>
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="delivery.html">Цена</a></li>
        <li><a href="login.html">Войти</a></li>
        <li><a href="register.html" class="btn-signup">Зарегистрироваться</a></li>
        <li><a href="card.html" class="active"><i class="fas fa-shopping-cart"></i> <span class="cart-count">0</span></a></li>
      </ul>
      <div class="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </nav>
    <div class="hero" style="padding-bottom: 1rem;">
      <h1>Ваша Корзина</h1>
      <p>Просмотрите выбранные букеты перед оформлением заказа.</p>
    </div>
  </header>
  <main class="container">
    <div class="cart-wrapper">
      <table style="width:100%; border-collapse: collapse;">
        <thead>
          <tr style="text-align:left; border-bottom: 2px solid #eee;">
            <th>Букет</th>
            <th>Цена</th>
            <th>Действие</th>
          </tr>
        </thead>
        <tbody id="cart-items">
          <!-- карты будут добавлены скриптом -->
        </tbody>
        <tfoot>
          <tr style="border-top: 2px solid #eee;">
            <td><strong>Итого</strong></td>
            <td colspan="2">€<span id="cart-total">0</span></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div style="margin-top: 1rem; text-align: right;">
      <button style="background-color: var(--primary-color); color:#fff;
       padding: 0.75rem 1.5rem; border:none; border-radius: var(--border-radius);
        font-weight:bold;" onclick="alert('Checkout flow not implemented in this demo.')">Оформить заказ</button>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 BloomFlow. Все права защищены.</p>
  </footer>
  <script src="../script.js"></script>
</body>
</html>
